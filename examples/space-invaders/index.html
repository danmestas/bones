<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    #score {
      font-size: 24px;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    #instructions {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 12px;
    }
    #game-wrap {
      position: relative;
      width: 640px;
      height: 480px;
    }
    #game {
      display: block;
      background: #000;
      border: 1px solid #333;
    }
    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 48px;
      letter-spacing: 4px;
      text-align: center;
    }
    #game-over.visible {
      display: flex;
    }
    #game-over .hint {
      font-size: 16px;
      color: #aaa;
      margin-top: 16px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <div id="instructions">Press SPACE to fire, arrows to move</div>
  <div id="game-wrap">
    <canvas id="game" width="640" height="480"></canvas>
    <div id="game-over">
      <div>GAME OVER</div>
      <div class="hint">Refresh to play again</div>
    </div>
  </div>

  <script>
    // Initialize the namespace BEFORE the module scripts load so they can
    // attach their submodules onto it without checking for existence.
    window.SpaceInvaders = window.SpaceInvaders || {};

    // Helper for slot C (input.js) to update the score display each frame.
    window.SpaceInvaders.updateScore = function (n) {
      var el = document.getElementById('score');
      if (el) {
        el.textContent = 'Score: ' + (n | 0);
      }
    };

    // Helper for slot C (input.js) to toggle the game over overlay.
    window.SpaceInvaders.showGameOver = function (visible) {
      var el = document.getElementById('game-over');
      if (!el) return;
      if (visible) {
        el.classList.add('visible');
      } else {
        el.classList.remove('visible');
      }
    };
  </script>

  <script src="engine.js"></script>
  <script src="audio.js"></script>
  <script src="input.js"></script>

  <script>
    // Kick off the game loop once all modules are loaded. Slot C owns the loop.
    (function () {
      function boot() {
        if (window.SpaceInvaders &&
            window.SpaceInvaders.input &&
            typeof window.SpaceInvaders.input.start === 'function') {
          window.SpaceInvaders.input.start();
        } else {
          // If something failed to load, surface it visibly without breaking the page.
          var s = document.getElementById('score');
          if (s) s.textContent = 'Score: 0  (input module failed to load)';
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
