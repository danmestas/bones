# golangci-lint configuration for bones.
# Schema: v2 (golangci-lint v2.x). See https://golangci-lint.run/usage/configuration/
#
# TigerStyle discipline gate — enforces formatting, correctness, and function-size
# limits. The intent is a small, opinionated set of linters that stay quiet on
# conforming code and loud on drift. Style-preference linters are excluded.

version: "2"

run:
  timeout: 5m
  # Skip the vendored/reference clones entirely — those are upstream trees we
  # consume, not code we own.
  tests: true

linters:
  # Start from a clean slate: enable only what we explicitly list below.
  default: none
  enable:
    - depguard      # substrate vs. domain layering (ADR 0025)
    - errcheck      # no unchecked errors
    - govet         # standard vet checks
    - staticcheck   # primary correctness linter (bundles gosimple, stylecheck, unused)
    - lll           # line length cap
    - funlen        # function size cap
    - misspell      # common spelling mistakes
  settings:
    depguard:
      # ADR 0025: internal/coord is the substrate layer. It must not import
      # the domain packages. The two exceptions below (internal/tasks and
      # internal/holds) are pre-existing imports that ADR 0025 documents as
      # follow-up work — redrawing the boundary is out of scope for the
      # initial relocation. Adding new domain imports from substrate will
      # break the build.
      rules:
        coord-substrate:
          files:
            - "**/internal/coord/**/*.go"
          deny:
            - pkg: github.com/danmestas/bones/internal/dispatch
              desc: "substrate (internal/coord) must not import domain (internal/dispatch)"
            - pkg: github.com/danmestas/bones/internal/autoclaim
              desc: "substrate (internal/coord) must not import domain (internal/autoclaim)"
            - pkg: github.com/danmestas/bones/internal/compactanthropic
              desc: "substrate (internal/coord) must not import domain (internal/compactanthropic)"
            # NOTE: internal/tasks and internal/holds are intentionally NOT
            # listed here. ADR 0025 records them as a known violation pending
            # follow-up; do not silently re-enable without a separate ADR.
    funlen:
      # TigerStyle: keep functions short. We cap by line count and deliberately
      # do not cap statements — a long expression shouldn't fail the build.
      lines: 70
      statements: -1
      ignore-comments: true
    lll:
      line-length: 100
      tab-width: 4
    misspell:
      locale: US
  exclusions:
    # Keep rules tight: no default excludes except where the tool insists.
    generated: lax
    rules:
      # Test files may have long table-driven test cases; exempt them from funlen.
      - path: _test\.go
        linters:
          - funlen
      # Reference clones are read-only upstream code; never lint them.
      - path: ^reference/
        linters:
          - errcheck
          - govet
          - staticcheck
          - lll
          - funlen
          - misspell

# golangci-lint v2 splits formatters from linters. gofmt lives here so it can
# be run via `golangci-lint fmt` and still reported as drift by `run`. The
# Makefile's fmt-check target is the source of truth for CI; this entry keeps
# editor integrations consistent.
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    paths:
      - ^reference/

issues:
  # Surface every finding — we want signal, not a sampled view.
  max-issues-per-linter: 0
  max-same-issues: 0
