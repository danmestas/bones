<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders 3D</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #game-container {
      position: relative;
      width: 960px;
      height: 600px;
    }

    canvas#game {
      display: block;
      background: #000;
      width: 960px;
      height: 600px;
      border: 1px solid #222;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
    }

    #hud > div {
      white-space: nowrap;
    }

    #status {
      color: #ffcc00;
      min-height: 1em;
    }

    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      z-index: 20;
      pointer-events: none;
    }

    #game-over.visible {
      display: flex;
    }

    #game-over .title {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #ff3333;
      margin-bottom: 16px;
      text-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
    }

    #game-over .restart-hint {
      font-size: 18px;
      color: #fff;
      opacity: 0.85;
    }

    #instructions {
      margin-top: 14px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      color: #aaa;
      letter-spacing: 1px;
    }

    #webgl-error {
      display: none;
      margin-top: 16px;
      padding: 16px 20px;
      background: #200;
      border: 1px solid #800;
      color: #f88;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      text-align: center;
      max-width: 600px;
    }

    #webgl-error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="960" height="600"></canvas>
    <div id="hud">
      <div id="score">Score: 0</div>
      <div id="lives">Lives: 3</div>
      <div id="status"></div>
    </div>
    <div id="game-over">
      <div class="title">GAME OVER</div>
      <div class="restart-hint">Press Enter to restart</div>
    </div>
  </div>

  <div id="instructions">Arrows: move &bull; Space: fire &bull; Enter: restart</div>

  <div id="webgl-error">
    WebGL not supported. This game requires a browser with WebGL enabled.
  </div>

  <script>
    // Initialize the global namespace BEFORE any module scripts load.
    window.SpaceInvaders = window.SpaceInvaders || {};

    // HUD helpers callable from input.js / engine.js.
    window.SpaceInvaders.updateScore = function (n) {
      var el = document.getElementById('score');
      if (el) el.textContent = 'Score: ' + n;
    };

    window.SpaceInvaders.updateLives = function (n) {
      var el = document.getElementById('lives');
      if (el) el.textContent = 'Lives: ' + n;
    };

    window.SpaceInvaders.showGameOver = function (visible) {
      var el = document.getElementById('game-over');
      if (!el) return;
      if (visible) {
        el.classList.add('visible');
      } else {
        el.classList.remove('visible');
      }
    };

    // Optional status line helper (handy for "WIN!", "Wave 2", etc.).
    window.SpaceInvaders.setStatus = function (text) {
      var el = document.getElementById('status');
      if (el) el.textContent = text || '';
    };
  </script>

  <!-- Three.js MUST load before module scripts so render.js sees global THREE. -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Module scripts (parser-blocking, ordered). -->
  <script src="engine.js"></script>
  <script src="audio.js"></script>
  <script src="render.js"></script>
  <script src="input.js"></script>

  <script>
    (function () {
      var canvas = document.getElementById('game');
      var errBox = document.getElementById('webgl-error');

      function fail(msg) {
        if (errBox) {
          errBox.textContent = msg || 'WebGL not supported. This game requires a browser with WebGL enabled.';
          errBox.classList.add('visible');
        }
      }

      if (!window.SpaceInvaders || !window.SpaceInvaders.render || typeof window.SpaceInvaders.render.init !== 'function') {
        fail('Render module failed to load.');
        return;
      }

      var ok = false;
      try {
        ok = window.SpaceInvaders.render.init(canvas) === true;
      } catch (e) {
        ok = false;
        console.error('render.init threw:', e);
      }

      if (!ok) {
        fail('WebGL not supported. This game requires a browser with WebGL enabled.');
        return;
      }

      if (window.SpaceInvaders.input && typeof window.SpaceInvaders.input.start === 'function') {
        try {
          window.SpaceInvaders.input.start();
        } catch (e) {
          console.error('input.start threw:', e);
        }
      }
    })();
  </script>
</body>
</html>
