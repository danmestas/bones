name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sibling EdgeSync checkout is still used to `make leaf` so integration
# tests have a local bin/leaf binary at LEAF_BIN.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Check out bones into ./bones so the sibling EdgeSync
      # clone can sit at ../EdgeSync.
      - name: Checkout bones
        uses: actions/checkout@v4
        with:
          path: bones

      - name: Checkout EdgeSync (sibling dir)
        uses: actions/checkout@v4
        with:
          repository: danmestas/EdgeSync
          path: EdgeSync

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: bones/go.sum

      # The golangci-lint-action binary is built with an older Go and ships a
      # v1 binary by default; we pin v2 (matches .golangci.yml schema) and let
      # setup-go's toolchain build it so the Go version matches go.mod.
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Build leaf binary (for integration tests)
        working-directory: EdgeSync
        run: |
          make leaf
          echo "LEAF_BIN=$GITHUB_WORKSPACE/EdgeSync/bin/leaf" >> $GITHUB_ENV

      - name: Build bones binary
        working-directory: bones
        run: |
          make bones
          echo "BONES_BIN=$GITHUB_WORKSPACE/bones/bin/bones" >> $GITHUB_ENV

      - name: make check
        working-directory: bones
        run: make check

      # Phase 2 of the Hipp audit gates direct OTel use behind -tags=otel.
      # Default builds must stay OTel-free (the seam in internal/telemetry
      # collapses to a no-op); this lane proves the otel-tagged paths still
      # compile and pass tests so the seam can't bit-rot.
      - name: build (-tags=otel)
        working-directory: bones
        run: go build -tags=otel ./...

      - name: test (-tags=otel)
        working-directory: bones
        run: go test -tags=otel ./...
