name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# EdgeSync is still private and is consumed via a local replace directive
# in go.mod (`replace github.com/dmestas/edgesync/leaf => ../EdgeSync/leaf`),
# so CI has to check it out alongside agent-infra. libfossil is now
# open-source, so no PAT rewrite for public modules is needed.
#
# Requires a repository secret GH_PRIVATE_DEPS_PAT with `repo` read access
# to github.com/danmestas/EdgeSync. Without it the EdgeSync checkout step
# fails.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Check out agent-infra into ./agent-infra so the sibling EdgeSync
      # clone can sit at ../EdgeSync, matching the go.mod replace path.
      - name: Checkout agent-infra
        uses: actions/checkout@v4
        with:
          path: agent-infra

      - name: Checkout EdgeSync (sibling dir)
        uses: actions/checkout@v4
        with:
          repository: danmestas/EdgeSync
          token: ${{ secrets.GH_PRIVATE_DEPS_PAT }}
          path: EdgeSync

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: agent-infra/go.sum

      # The golangci-lint-action binary is built with an older Go and ships a
      # v1 binary by default; we pin v2 (matches .golangci.yml schema) and let
      # setup-go's toolchain build it so the Go version matches go.mod.
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: make check
        working-directory: agent-infra
        run: make check
